<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Pavnika by Saranya</title>
<meta name="description" content="Verify your email to enter Pavnika by Saranya, authentic Kanchipuram silk sarees, Dubai based online boutique.">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>
(function () {
  function getCookie(name) {
    var m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return m ? m[2] : null;
  }
  if (getCookie('pavnika_verified') === '1') {
    window.location.replace('home.html');
  }
})();
</script>
</head>
<body class="login-page">

<div class="login-bg" aria-hidden="true"></div>

<div class="login-wrap">
  <div class="gate-card" id="login-form-root">
    <img src="assets/logo.png" alt="Pavnika by Saranya" class="gate-logo">
    <div id="gate-step-details">
      <h2>Welcome to Pavnika by Saranya</h2>
      <p>Please verify your email to enter the site.</p>
      <div class="field"><label>Email</label><input type="email" id="gate-email" autocomplete="email"></div>
      <div class="field"><label>Mobile Number</label><input type="tel" id="gate-phone" autocomplete="tel"></div>
      <div class="gate-consent-row">
        <input type="checkbox" id="gate-consent-checkbox">
        <label for="gate-consent-checkbox">
          I agree to the <a href="#" class="gate-legal-link" data-page="terms.html">Terms &amp; Conditions</a> and <a href="#" class="gate-legal-link" data-page="privacy.html">Privacy &amp; Cookies Policy</a>
        </label>
      </div>
      <button type="button" id="gate-send-btn" class="btn btn-primary" disabled>Send Verification Code</button>
      <p class="gate-error" id="gate-error-1"></p>
    </div>
    <div id="gate-step-code" style="display:none;">
      <h2>Enter Verification Code</h2>
      <p>We sent a 4-digit code to your email — it expires in 10 minutes.</p>
      <input type="text" id="gate-code" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code">
      <button type="button" id="gate-verify-btn" class="btn btn-primary">Verify &amp; Enter</button>
      <p class="gate-error" id="gate-error-2"></p>
      <button type="button" id="gate-resend-btn" class="gate-resend">Resend code</button>
    </div>
  </div>
</div>

<div class="legal-popup" id="legal-popup">
  <div class="legal-popup-inner">
    <button type="button" class="legal-popup-close" id="legal-popup-close" aria-label="Close">&times;</button>
    <div class="legal-popup-body" id="legal-popup-body">
      <p style="text-align:center; opacity:0.7;">Loading…</p>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
